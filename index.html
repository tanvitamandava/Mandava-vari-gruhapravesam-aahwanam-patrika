<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruha Pravesam Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: Arial, sans-serif;
        }

        .invitation-container {
            position: relative;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            overflow: hidden;
            background: white;
        }

        .invitation-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .map-button {
            position: absolute;
            bottom: 265px;
            left: 30%; /* Shifted left from 33% */
            transform: translateX(-50%);
            background: transparent;
            color: #9c6425;
            border: none;
            padding: 6px 20px;
            border-radius: 15px;
            font-family: 'EB Garamond', serif;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: none;
            transition: all 0.3s ease;
            z-index: 10;
            min-width: 120px;
        }

        .map-button:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: none;
            background: rgba(139, 69, 19, 0.1);
        }

        .map-button:active {
            transform: translateX(-50%) translateY(-1px);
        }

        .map-button::before {
            content: "";
            margin-right: 0px;
        }

        @media (max-width: 600px) {
            .invitation-container {
                width: 95%;
                margin: 20px auto;
            }

            .map-button {
                bottom: 28vw;
                left: 45%; /* Shifted left from 50% */
                transform: translateX(-50%);
                padding: 5px 16px;
                font-size: 13px;
                min-width: 100px;
            }
        }

        @media (max-width: 400px) {
            .map-button {
                bottom: 29vw;
                left: 43%; /* Shifted left slightly more */
                transform: translateX(-50%);
                padding: 4px 12px;
                font-size: 12px;
                min-width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <img src="static/image.png" alt="Gruha Pravesam Invitation" class="invitation-image">
        <button class="map-button" onclick="openMap()">Click for Location</button>
    </div>

    <script>
        function openMap() {
            window.open('https://maps.app.goo.gl/YmWNKpXVp2Jkm9kU6', '_blank');
        }

        // Add a subtle animation when the page loads
        window.addEventListener('load', function() {
            const container = document.querySelector('.invitation-container');
            container.style.opacity = '0';
            container.style.transform = 'scale(0.9)';
            container.style.transition = 'all 0.6s ease';

            setTimeout(() => {
                container.style.opacity = '1';
                container.style.transform = 'scale(1)';
            }, 100);
        });
    </script>
</body>
</html>
